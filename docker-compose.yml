version: '3.8'

services:
  # ==========================================
  # DATABASE LAYER (Terisolasi)
  # ==========================================
  db:
    image: mariadb:10.11
    container_name: wp_database
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - backend-net
    volumes:
      - db_data:/var/lib/mysql

  # ==========================================
  # APPLICATION LAYER (WordPress)
  # ==========================================
  wordpress:
    image: wordpress:6.4-php8.2-apache
    container_name: wp_app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${WP_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
    networks:
      - frontend-net
      - backend-net
    volumes:
      - wp_data:/var/www/html

# ==========================================
# CUSTOM NETWORKS
# ==========================================
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

# ==========================================
# DOCKER VOLUMES
# ==========================================
volumes:
  db_data:
  wp_data: